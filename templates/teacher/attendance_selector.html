{% extends "base.html" %}
{% block title %}Select Course for Attendance{% endblock %}

{% block content %}
<div class="container mt-4">
    <h3 class="mb-3">📋 Select Course for Attendance</h3>

    {% if courses %}
    <form method="GET" action="{{ url_for('teacher_routes.attendance_panel', course_id=0) }}">
        <div class="form-group">
            <label for="course">Choose a course:</label>
            <select id="course" name="course_id" class="form-control" required onchange="redirectToPanel(this)">
                <option value="">-- Select --</option>
                {% for course in courses %}
                    <option value="{{ course.id }}">{{ course.name }} ({{ course.session }})</option>
                {% endfor %}
            </select>
        </div>
    </form>
    {% else %}
        <div class="alert alert-warning">⚠️ No courses assigned to you.</div>
    {% endif %}
</div>

<script>
function redirectToPanel(select) {
    const courseId = select.value;
    if (courseId) {
        window.location.href = "/teacher/attendance/panel/" + courseId;
    }
}
</script>
{% endblock %}
