{% extends "base.html" %}
{% block content %}
<div class="container py-5">
  <h3 class="text-center text-primary fw-bold mb-4">👨‍🏫 Teacher Login</h3>

  <!-- 🔹 Flash Messages -->
  {% with messages = get_flashed_messages(with_categories=true) %}
    {% if messages %}
      {% for category, message in messages %}
        <div class="alert alert-{{ category }} alert-dismissible fade show" role="alert">
          {{ message }}
          <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
        </div>
      {% endfor %}
    {% endif %}
  {% endwith %}

  <!-- 🔐 Login Form -->
  <form method="POST" action="{{ url_for('public_routes.teacher_login') }}" class="mx-auto" style="max-width: 400px;">
    <div class="mb-3">
      <label for="email" class="form-label fw-semibold">📧 Email address</label>
      <input type="email" class="form-control" id="email" name="email" required placeholder="Enter your email">
    </div>

    <div class="mb-3">
      <label for="password" class="form-label fw-semibold">🔐 Password</label>
      <input type="password" class="form-control" id="password" name="password" required placeholder="Enter your password">
    </div>

    <button type="submit" class="btn btn-primary w-100">🔓 Login</button>
  </form>

  <!-- 📝 OTP Registration Link -->
  <div class="text-center mt-3">
    <a href="{{ url_for('public_routes.request_otp') }}" class="text-decoration-none">📝 Don't have a password? <strong>Request OTP</strong></a>
  </div>
</div>
{% endblock %}
